@for (entry of visibleEntries(); track entry.company + entry.role) {
  <app-timeline-entry class="timeline-item" [entry]="entry" />
}
@if (collapsedCount() > 0) {
  <button class="toggle-btn" (click)="showEarlier.set(!showEarlier())">
    @if (showEarlier()) {
      <span class="toggle-arrow">↑</span> Hide earlier roles
    } @else {
      <span class="toggle-arrow">↓</span> Show {{ collapsedCount() }} earlier roles
    }
  </button>
}
